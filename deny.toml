# cargo-deny Konfiguration — Supply-Chain-Gate (Ticket-0020).
# Reproduzieren: cargo deny check

[graph]
# talker ist macOS-only (Apple Silicon). Linux/Windows-only-Zweige des
# Dependency-Graphen (gtk, wayland, quick-xml via winit/tray-icon) werden
# nie gebaut und daher hier nicht geprüft.
targets = ["aarch64-apple-darwin"]

[advisories]
yanked = "deny"

[licenses]
# talker selbst (publish = false) wird nicht geprüft; das license-Feld
# kommt mit der Lizenz-Einführung (Ticket-0021, MIT).
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    # webpki-roots (CA-Zertifikat-Daten) — nur Build-Dependency von
    # sherpa-rs-sys (ureq für den Binary-Download beim Build), nicht im Binary.
    "CDLA-Permissive-2.0",
    # epaint default_fonts (eingebettete UI-Fonts in egui): Font-Lizenzen,
    # erlauben Einbettung und Weitergabe.
    "OFL-1.1",
    "Ubuntu-font-1.0",
    # libbz2-rs-sys (Pure-Rust-bzip2 fürs Parakeet-Tarball-Entpacken,
    # Ticket-0028): klassische bzip2-Lizenz, BSD-artig permissiv.
    "bzip2-1.0.6",
]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
